<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .wrapper { width: 640px; height: 960px; max-width: 100vw; max-height: 100dvh; }
    .modal-overlay { background: rgba(0,0,0,0.45); }
    .btn-submit { background: #DC2626; }
    .btn-submit:hover { background: #B91C1C; }
    .btn-submit.disabled { background: #9CA3AF; cursor: not-allowed; }
    .btn-check { background: #0066FF; }
    .btn-check:hover { background: #0052CC; }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="wrapper flex flex-col mx-auto">
    <div class="bg-white rounded-2xl shadow-lg flex flex-col flex-1 overflow-hidden">

      <div class="bg-gradient-to-br from-[#0066FF] to-[#0052CC] px-10 py-12 text-center shrink-0">
        <div class="w-16 h-16 mx-auto mb-4 bg-white/20 rounded-full flex items-center justify-center text-3xl">
          &#128196;
        </div>
        <h1 id="page-title" class="text-white text-2xl font-semibold tracking-tight">Ticket System</h1>
      </div>

      <div class="flex-1 px-10 py-10 flex flex-col items-center justify-center text-center">

        <div id="view-loading" class="flex flex-col items-center">
          <div class="w-10 h-10 border-3 border-[#0066FF] border-t-transparent rounded-full animate-spin mb-6"></div>
          <p class="text-gray-500 text-sm">Loading...</p>
        </div>

        <div id="view-main" class="hidden w-full flex flex-col items-center gap-6">
          <p id="main-desc" class="text-gray-500 text-sm max-w-sm">Select an action below to continue.</p>

          <button id="btn-submit" class="btn-submit w-full max-w-xs py-3.5 rounded-xl text-white text-base font-medium transition-colors duration-200">
            Submit Ticket
          </button>
          <button id="btn-check" class="btn-check w-full max-w-xs py-3.5 rounded-xl text-white text-base font-medium transition-colors duration-200">
            Check Ticket
          </button>
        </div>

        <div id="view-error" class="hidden flex flex-col items-center">
          <div class="w-20 h-20 rounded-full bg-yellow-100 flex items-center justify-center text-4xl mb-6">&#9888;</div>
          <p class="text-gray-800 text-lg font-semibold mb-2">Invalid Link</p>
          <p class="text-gray-500 text-sm">Please use a valid ticket link from the forum.</p>
        </div>
      </div>

      <div class="px-10 py-6 border-t border-gray-100 text-center shrink-0">
        <span class="text-xs text-gray-400">&copy; 2024 Customer Support. All rights reserved.</span>
      </div>
    </div>
  </div>

  <div id="modal" class="modal-overlay fixed inset-0 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-2xl px-8 py-8 max-w-sm w-[90%] text-center">
      <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-red-100 flex items-center justify-center text-2xl">&#9888;</div>
      <p id="modal-msg" class="text-gray-800 text-base font-medium">Link expired.</p>
      <button id="modal-close" class="mt-6 px-8 py-2.5 rounded-xl bg-[#0066FF] text-white text-sm font-medium hover:bg-[#0052CC] transition-colors">OK</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      var LANG_DATA = {
        tc: {
          title: '超自然行動組工單系統',
          submit: '提交工單',
          check: '查詢工單',
          expired: '該鏈接已過期，請聯繫客服',
          desc: '請選擇以下操作',
          submitUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/submit?pluginId=19ebbe4b37584c09b6942924cd5d7091&type=1',
          checkUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/list?pluginId=19ebbe4b37584c09b6942924cd5d7091&type=1'
        },
        kr: {
          title: 'Tomb Busters 티켓 시스템',
          submit: '티켓 제출',
          check: '티켓 조회',
          expired: '링크가 만료되었습니다. 고객센터로 문의해 주세요',
          desc: '다음 작업을 선택하세요',
          submitUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/submit?pluginId=de7dd8a38b6f4b4f85fafda3f2c4ef16&type=1',
          checkUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/list?pluginId=de7dd8a38b6f4b4f85fafda3f2c4ef16&type=1'
        },
        jp: {
          title: '超自然スクワッドカスタマーセンター',
          submit: 'チケット提出',
          check: 'チケット確認',
          expired: 'リンクの有効期限が切れました。カスタマーセンターへお問い合わせください',
          desc: '以下の操作を選択してください',
          submitUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/submit?pluginId=aba01a31a96d4c2e99daf50d9814163d&type=1',
          checkUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/list?pluginId=aba01a31a96d4c2e99daf50d9814163d&type=1'
        },
        en: {
          title: 'Tomb Busters Ticket System',
          submit: 'Submit Ticket',
          check: 'Check Ticket',
          expired: 'This link has expired, please contact customer support',
          desc: 'Select an action below to continue.',
          submitUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/submit?pluginId=a105e6dee58a4b778686440c1418f704&type=1',
          checkUrl: 'https://giantnetwork.qiyukf.com/worksheet/page/plugin/list?pluginId=a105e6dee58a4b778686440c1418f704&type=1'
        }
      };

      var STORAGE_PREFIX = 'tk_';

      var $loading = document.getElementById('view-loading');
      var $main = document.getElementById('view-main');
      var $error = document.getElementById('view-error');
      var $pageTitle = document.getElementById('page-title');
      var $mainDesc = document.getElementById('main-desc');
      var $btnSubmit = document.getElementById('btn-submit');
      var $btnCheck = document.getElementById('btn-check');
      var $modal = document.getElementById('modal');
      var $modalMsg = document.getElementById('modal-msg');
      var $modalClose = document.getElementById('modal-close');

      function getParams() {
        var p = new URLSearchParams(window.location.search);
        return {
          token: p.get('token') || '',
          lang: p.get('lang') || 'en',
          time: p.get('time') || ''
        };
      }

      function getLang(lang) {
        return LANG_DATA[lang] || LANG_DATA['en'];
      }

      function isTokenUsed(token) {
        return localStorage.getItem(STORAGE_PREFIX + token) !== null;
      }

      function markTokenUsed(token) {
        localStorage.setItem(STORAGE_PREFIX + token, '1');
      }

      function showModal(msg) {
        $modalMsg.textContent = msg;
        $modal.classList.remove('hidden');
        $modal.classList.add('flex');
      }

      function hideModal() {
        $modal.classList.add('hidden');
        $modal.classList.remove('flex');
      }

      function init() {
        var params = getParams();
        var langData = getLang(params.lang);

        document.title = langData.title;
        $pageTitle.textContent = langData.title;
        $mainDesc.textContent = langData.desc;
        $btnSubmit.textContent = langData.submit;
        $btnCheck.textContent = langData.check;

        if (!params.token) {
          $loading.classList.add('hidden');
          $error.classList.remove('hidden');
          return;
        }

        if (isTokenUsed(params.token)) {
          $btnSubmit.classList.add('disabled');
          $btnSubmit.textContent = langData.submit;
        }

        $btnSubmit.addEventListener('click', function() {
          if (isTokenUsed(params.token)) {
            showModal(langData.expired);
            return;
          }
          markTokenUsed(params.token);
          this.classList.add('disabled');
          window.location.href = langData.submitUrl;
        });

        $btnCheck.addEventListener('click', function() {
          window.location.href = langData.checkUrl;
        });

        $loading.classList.add('hidden');
        $main.classList.remove('hidden');
      }

      $modalClose.addEventListener('click', hideModal);
      $modal.addEventListener('click', function(e) {
        if (e.target === $modal) hideModal();
      });

      init();
    })();
  </script>
</body>
</html>
